<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strip-Design Page</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stripdesign(v).css') }}">
  <style>
    #stripCanvas {
      position: absolute;
      top: 3.8%;
      left: 16.5%;
      width: 67%;
      height: 77%;
    }
  </style>
</head>

<body>
    <div class="photo-container"> 
      <img src="{{ url_for('static', filename='assets/strip-design(v).png') }}" class="foreground-photo" alt="Strip design photo">
      <canvas id="stripCanvas"></canvas>
    </div>

    <div class="frame-circle-button-wrapper">
        <button class="circle-btn white"></button>
        <button class="circle-btn black"></button>
        <button class="circle-btn pink"></button>
        <button class="circle-btn blue"></button>
        <button class="circle-btn green"></button>
        <button class="circle-btn white-polka"></button>
        <button class="circle-btn black-polka"></button>
        <button class="circle-btn red-polka"></button>
    </div>

    <div class="filter-circle-button-wrapper">
        <button class="circle-btn none"></button>
        <button class="circle-btn bnw"></button>
        <button class="circle-btn vintage"></button>
        <button class="circle-btn bright"></button>
    </div>

    <div>
        <a class="photo-button" href="{{ url_for('stripselect.stickerpagev') }}">Continue</a>
    </div>

    <script>
        // Frame PNG slot coordinates — where photos go (from the transparent holes)
        const FRAME_MAP = {
            "fourbyone":  { file: "/static/assets/frames/4x1.png",  w: 694,  h: 1138, slots: [{r0:44, c0:166,r1:240,c1:487},{r0:257,c0:166,r1:453,c1:487},{r0:470,c0:166,r1:666,c1:487},{r0:683,c0:166,r1:879,c1:487}] },
            "twobytwo":   { file: "/static/assets/frames/2x2.png",  w: 420,  h: 593,  slots: [{r0:37,c0:48,r1:252,c1:199},{r0:37,c0:213,r1:252,c1:365},{r0:266,c0:48,r1:480,c1:199},{r0:266,c0:213,r1:480,c1:365}] },
            "fourbytwo":  { file: "/static/assets/frames/4x2.png",  w: 522,  h: 774,  slots: [{r0:70,c0:63,r1:185,c1:254},{r0:70,c0:264,r1:185,c1:454},{r0:202,c0:63,r1:317,c1:254},{r0:202,c0:264,r1:317,c1:454},{r0:333,c0:63,r1:448,c1:254},{r0:333,c0:264,r1:448,c1:454},{r0:465,c0:63,r1:580,c1:254},{r0:465,c0:264,r1:580,c1:454}] },
            "onebythree": { file: "/static/assets/frames/1x3.png",  w: 1280, h: 567,  slots: [{r0:83,c0:184,r1:415,c1:464},{r0:83,c0:488,r1:415,c1:768},{r0:83,c0:792,r1:415,c1:1073}] },
            "onebyfour":  { file: "/static/assets/frames/1x4.png",  w: 1280, h: 498,  slots: [{r0:61,c0:142,r1:361,c1:377},{r0:61,c0:397,r1:361,c1:631},{r0:61,c0:651,r1:361,c1:886},{r0:61,c0:906,r1:361,c1:1141}] },
        };

        const FRAME_COLORS = {
            "white":       [255, 255, 255],
            "black":       [30,  30,  30 ],
            "pink":        [253, 200, 200],
            "blue":        [203, 227, 235],
            "green":       [172, 192, 172],
            "white-polka": [255, 255, 255],
            "black-polka": [30,  30,  30 ],
            "red-polka":   [180, 40,  40 ],
        };

        let selectedColor  = "white";
        let selectedFilter = "none";
        let photoImages    = [];
        let frameInfo      = null;

        const canvas = document.getElementById("stripCanvas");
        const ctx    = canvas.getContext("2d");

        const frameImg = new Image();
        frameImg.onload = () => drawStrip();

        async function loadPhotos() {
            const res  = await fetch("/stripselect/get_photos");
            const data = await res.json();

            frameInfo = FRAME_MAP[data.button] || FRAME_MAP["fourbyone"];
            canvas.width  = frameInfo.w;
            canvas.height = frameInfo.h;
            frameImg.src  = frameInfo.file;

            photoImages = await Promise.all(data.photos.map(src => new Promise(resolve => {
                const img  = new Image();
                img.onload = () => resolve(img);
                img.src    = src;
            })));

            drawStrip();
        }

        function applyFilter(imageData, filter) {
            const d = imageData.data;
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                if (filter === "bnw") {
                    const gray = 0.299*r + 0.587*g + 0.114*b;
                    d[i] = d[i+1] = d[i+2] = gray;
                } else if (filter === "vintage") {
                    d[i]   = Math.min(255, r * 1.1);
                    d[i+1] = Math.min(255, g * 0.9);
                    d[i+2] = Math.min(255, b * 0.7);
                } else if (filter === "bright") {
                    d[i]   = Math.min(255, r * 1.3);
                    d[i+1] = Math.min(255, g * 1.3);
                    d[i+2] = Math.min(255, b * 1.3);
                }
            }
            return imageData;
        }

        function drawStrip() {
            if (!frameInfo) return;
            const [r, g, b] = FRAME_COLORS[selectedColor] || [255,255,255];

            // Background color
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, frameInfo.w, frameInfo.h);

            // Draw photos into slots
            frameInfo.slots.forEach((slot, i) => {
                const slotW = slot.c1 - slot.c0;
                const slotH = slot.r1 - slot.r0;

                if (photoImages[i]) {
                    const img        = photoImages[i];
                    const slotRatio  = slotW / slotH;
                    const photoRatio = img.width / img.height;
                    let sx, sy, sw, sh;
                    if (photoRatio > slotRatio) {
                        sh = img.height; sw = sh * slotRatio;
                        sx = (img.width - sw) / 2; sy = 0;
                    } else {
                        sw = img.width; sh = sw / slotRatio;
                        sx = 0; sy = (img.height - sh) / 2;
                    }

                    const off    = document.createElement("canvas");
                    off.width    = slotW;
                    off.height   = slotH;
                    const offCtx = off.getContext("2d");
                    offCtx.drawImage(img, sx, sy, sw, sh, 0, 0, slotW, slotH);

                    if (selectedFilter !== "none") {
                        const imgData = offCtx.getImageData(0, 0, slotW, slotH);
                        offCtx.putImageData(applyFilter(imgData, selectedFilter), 0, 0);
                    }
                    ctx.drawImage(off, slot.c0, slot.r0);
                } else {
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.fillRect(slot.c0, slot.r0, slotW, slotH);
                }
            });

            // Frame overlay on top
            if (frameImg.complete && frameImg.naturalWidth) {
                ctx.drawImage(frameImg, 0, 0, frameInfo.w, frameInfo.h);
            }
        }

        // Color button clicks
        document.querySelectorAll(".frame-circle-button-wrapper .circle-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                selectedColor = [...btn.classList].find(c => c !== "circle-btn");
                drawStrip();
            });
        });

        // Filter button clicks
        document.querySelectorAll(".filter-circle-button-wrapper .circle-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                selectedFilter = [...btn.classList].find(c => c !== "circle-btn");
                drawStrip();
            });
        });

        loadPhotos();
    </script>
</body>
</html>

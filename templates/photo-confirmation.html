<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Confirmation Page</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='photo-confirmation.css') }}">
  <style>
    .photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .photos-grid img {
      width: 200px;
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="photo-container">
    <img src="{{ url_for('static', filename='photos/' + photo.split('/')[-1]) }}" style="width:300px;height:300px;">
  </div>
  <div>
    {% if photo_id > 0 %}
      <a href="{{ url_for('stripselect.photo_confirmation', photo_id=photo_id-1) }}">Previous</a>
    {% endif %}
    {% if photo_id < photos|length - 1 %}
      <a href="{{ url_for('stripselect.photo_confirmation', photo_id=photo_id+1) }}">Next</a>
    {% endif %}
    <p>Photo {{ photo_id + 1 }}</p>
  </div>
</body>
</html>

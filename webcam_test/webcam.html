<!DOCTYPE html>
<html>
<head>
    <title>Proof of Concept</title>
    <style>
        /* CSS must go inside a <style> tag */
        body {
            background-color: black;
            display: flex;         /* Added this to make align-items work */
            justify-content: center;
            height: 100vh;
            margin: 0;
            align-items: center;
        }

        #video-container {
            width: 80%;
            max-width: 800px;   /*size of video container */
            margin: auto;
            border: 1px solid #333; 
            aspect-ratio: 1 / 1;  /* Makes it square */
        }

        video {
            width: 100%;
            height: 100%;
            display: block;       /* Removes small gap at bottom of video */
            background: #000;
            object-fit: cover;  /* Crops video to fill square */
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script>
    async function startCamera() {
        const videoElement = document.getElementById('webcam');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            videoElement.srcObject = stream;
            // This makes it look like a mirror
            videoElement.style.transform = "scaleX(-1)"; 
        } catch (error) {
            console.error("DETAILED ERROR:", error.name, error.message);
            alert("Error: " + error.name + ". Check the console (F12) for details.");
        }
    }
    startCamera();
</script>
</body>
</html>
